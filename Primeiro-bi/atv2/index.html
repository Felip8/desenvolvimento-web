<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>
    <form action="">
        <fieldset>
            <p>Crie sua conta</p>
            <label for="nome">Nome:</label><br>
            <input type="text" placeholder="Digite o seu nome" required>
            <br>
            <br>
            <label for="nome">E-mail:</label><br>
            <input type="email" placeholder="Digite o seu email" required>
            <br>
            <br>
            <label for="nome">Senha:</label><br>
            <input type="password" placeholder="Sua melhor senha" required>
            <br>
            <br>

            <label for="genero">Gênero:</label>
            <br><br>
            <input type="radio">Feminino <br>
            <input type="radio">Masculino <br>
            <input type="radio">Outro <br>

            <br><br>
            <label for="biografia">
                <textarea name="" id="" placeholder="Fale um pouco sobre você..." style="width: 200px; height: 100px;"
                    required></textarea>
            </label>

            <br>
            <br>
            <input type="checkbox">Eu li e aceito os termos de serviço

            <br><br>

            <button>Cadastrar</button>
            <button>Limpar</button>

        </fieldset>
    </form>
</body>

</html>
